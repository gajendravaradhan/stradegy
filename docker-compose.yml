version: "3.8"

services:
  stradegy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stradegy
    restart: unless-stopped
    ports:
      - "8420:8420"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./eval:/app/eval
      - ./logs:/app/logs
      - ./backend/.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stradegy-tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./config/cloudflared:/etc/cloudflared:ro
    depends_on:
      stradegy:
        condition: service_healthy
    profiles:
      - tunnel
