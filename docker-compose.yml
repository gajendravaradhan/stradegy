version: "3.8"

services:
  stradegy:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/gajendravaradhan/stradegy:latest
    container_name: stradegy
    restart: unless-stopped
    ports:
      - "8420:8420"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./eval:/app/eval
      - ./logs:/app/logs
      - ./secrets/.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8420/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: stradegy-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data
      - ./caddy-config:/config
    depends_on:
      - stradegy
